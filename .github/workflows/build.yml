name: Build ESP32-C3 Firmware (Arduino)

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Arduino Core
        run: |
          arduino-cli config init
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17
          arduino-cli core list

      # If your sketch uses Adafruit_MPU6050, keep these.
      # If you DO NOT use them, you can delete this whole step.
      - name: Install Libraries (MPU6050)
        run: |
          arduino-cli lib update-index
          arduino-cli lib install "Adafruit MPU6050"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "Adafruit BusIO"

      # Your sketch is in: src/main.ino (from your repo screenshot)
      - name: Compile ESP32-C3
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3 \
            --warnings all \
            --output-dir build \
            ./src

      - name: Upload BIN (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-bin
          path: build/*.bin
